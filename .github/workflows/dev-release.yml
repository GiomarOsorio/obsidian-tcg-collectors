name: Dev Release

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Delete existing dev release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.version.outputs.version }}-dev" --yes 2>/dev/null || true
          git push --delete origin "${{ steps.version.outputs.version }}-dev" 2>/dev/null || true

      - name: Create dev pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${VERSION}-dev"
          COMMIT="${GITHUB_SHA::7}"
          gh release create "$TAG" \
            main.js manifest.json styles.css \
            --title "v${VERSION}-dev (${COMMIT})" \
            --notes "⚠️ **Development build** — not for production use.

Built from commit \`${COMMIT}\` on \`dev\` branch.

**Install via BRAT:** Add \`GiomarOsorio/obsidian-tcg-collectors\` as a beta plugin and check **'Enable beta testing for all plugins'** to receive dev builds." \
            --prerelease
